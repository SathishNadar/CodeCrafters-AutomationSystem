<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: rgba(255,255,255,0.04);
      --surface-hi: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #f1f5f9;
      --text-dim: #64748b;
      --text-muted: #334155;
      --accent: #818cf8;
      --accent-glow: rgba(129,140,248,0.18);

      /* State colors */
      --focus-col: #10b981;
      --focus-bg: rgba(16,185,129,0.12);
      --passive-col: #60a5fa;
      --passive-bg: rgba(96,165,250,0.12);
      --distracted-col: #f43f5e;
      --distracted-bg: rgba(244,63,94,0.12);
      --idle-col: #94a3b8;
      --idle-bg: rgba(148,163,184,0.10);
      --transit-col: #f59e0b;
      --transit-bg: rgba(245,158,11,0.12);
    }

    html { width: 360px; }

    body {
      width: 360px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', 'Space Grotesk', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Background noise texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 150% 80% at 50% -10%, rgba(99,102,241,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 80% 60% at 80% 100%, rgba(16,185,129,0.07) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .popup-inner { position: relative; z-index: 1; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 30px; height: 30px;
      border-radius: 9px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px rgba(99,102,241,0.35);
    }

    .brand-mark .material-symbols-outlined {
      font-size: 16px;
      color: #fff;
      font-variation-settings: 'FILL' 1;
    }

    .brand-meta { display: flex; flex-direction: column; gap: 1px; }
    .brand-kicker { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
    .brand-name { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }

    .connection-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.15em;
      color: var(--text-dim);
    }

    .connection-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 2s ease-in-out infinite;
    }

    .connection-dot.live { background: #10b981; animation: none; box-shadow: 0 0 6px #10b981; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── State Hero Card ── */
    .state-hero {
      margin: 12px 12px 0;
      padding: 16px;
      border-radius: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s, background 0.4s;
    }

    .state-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .state-hero.s-active_focus  { border-color: rgba(16,185,129,0.4); }
    .state-hero.s-active_focus::before  { background: radial-gradient(ellipse at top left, rgba(16,185,129,0.08), transparent 60%); opacity: 1; }
    .state-hero.s-passive_focus { border-color: rgba(96,165,250,0.4); }
    .state-hero.s-passive_focus::before { background: radial-gradient(ellipse at top left, rgba(96,165,250,0.08), transparent 60%); opacity: 1; }
    .state-hero.s-distracted    { border-color: rgba(244,63,94,0.4); }
    .state-hero.s-distracted::before    { background: radial-gradient(ellipse at top left, rgba(244,63,94,0.08), transparent 60%); opacity: 1; }
    .state-hero.s-idle          { border-color: rgba(148,163,184,0.25); }
    .state-hero.s-transitioning { border-color: rgba(245,158,11,0.35); }
    .state-hero.s-transitioning::before { background: radial-gradient(ellipse at top left, rgba(245,158,11,0.07), transparent 60%); opacity: 1; }

    .state-row {
      display: flex; align-items: center; gap: 12px;
      position: relative;
    }

    .state-icon-wrap {
      width: 44px; height: 44px;
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-hi);
      flex-shrink: 0;
      transition: background 0.4s;
    }

    .state-icon-wrap .material-symbols-outlined {
      font-size: 22px;
      font-variation-settings: 'FILL' 1;
    }

    .state-main { flex: 1; min-width: 0; }
    .state-kicker { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 3px; }
    .state-label { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .state-domain { font-size: 11px; color: var(--text-dim); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }

    .focus-score-wrap { text-align: right; flex-shrink: 0; }
    .focus-score-num { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
    .focus-score-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-top: 2px; }

    /* Focus bar */
    .focus-bar-track {
      margin-top: 14px;
      height: 4px;
      border-radius: 4px;
      background: var(--surface-hi);
      overflow: hidden;
      position: relative;
    }

    .focus-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Metric grid ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 8px 12px 0;
    }

    .metric-card {
      padding: 12px 13px;
      border-radius: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .metric-kicker { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
    .metric-value { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
    .metric-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* ── Work mode badge ── */
    .work-mode-row {
      margin: 8px 12px 0;
      padding: 11px 14px;
      border-radius: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .work-mode-row .material-symbols-outlined {
      font-size: 18px;
      color: var(--accent);
      font-variation-settings: 'FILL' 1;
    }

    .work-mode-text { flex: 1; }
    .work-mode-label { font-size: 11px; font-weight: 600; color: var(--text); }
    .work-mode-desc { font-size: 10px; color: var(--text-dim); }

    /* ── Notification hold ── */
    .notif-hold {
      margin: 8px 12px 0;
      padding: 10px 14px;
      border-radius: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .notif-hold .material-symbols-outlined {
      font-size: 18px;
      font-variation-settings: 'FILL' 1;
    }

    .notif-count-badge {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    .footer {
      margin: 12px 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .footer-link {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      color: var(--text-dim);
      text-decoration: none;
      display: flex; align-items: center; gap: 4px;
      cursor: default;
    }

    .footer-link .material-symbols-outlined { font-size: 13px; }

    .dashboard-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(129,140,248,0.25);
    }

    /* ── Empty / loading state ── */
    .empty-state {
      padding: 36px 20px;
      text-align: center;
    }

    .empty-state .material-symbols-outlined {
      font-size: 40px;
      color: var(--text-muted);
      display: block;
      margin-bottom: 12px;
      font-variation-settings: 'FILL' 0;
    }

    .empty-title { font-size: 14px; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; }
    .empty-desc { font-size: 11px; color: var(--text-muted); line-height: 1.6; }
  </style>
</head>
<body>
<div class="popup-inner">

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-mark">
        <span class="material-symbols-outlined">timeline</span>
      </div>
      <div class="brand-meta">
        <span class="brand-kicker">Cognitive Ops</span>
        <span class="brand-name">Signal Forge</span>
      </div>
    </div>
    <div class="connection-pill">
      <span class="connection-dot" id="conn-dot"></span>
      <span id="conn-label">Loading</span>
    </div>
  </div>

  <!-- Content: populated by popup.js -->
  <div id="content"></div>

</div>
<script src="popup.js"></script>
</body>
</html>
