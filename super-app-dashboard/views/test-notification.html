<div class="max-w-4xl mx-auto space-y-6 animate-fade-in-up">
    <!-- Header -->
    <header class="flex flex-col gap-2 mb-8">
        <h2 class="text-2xl font-bold tracking-tight text-dynamic">Test Integrations</h2>
        <p class="text-sm text-dynamic-variant">Send dummy payloads to local extensions to verify ContextBridge connection.</p>
    </header>

    <!-- Cards Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- VS Code Test Card -->
        <div class="p-6 rounded-3xl bg-[var(--surface-low)] border border-[var(--outline-var)] flex flex-col gap-4 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-br from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-blue-500/10 flex items-center justify-center border border-blue-500/20">
                    <span class="material-symbols-outlined text-blue-500 text-2xl">code</span>
                </div>
                <div>
                    <h3 class="font-semibold text-dynamic">VS Code Notifier</h3>
                    <p class="text-xs text-dynamic-variant">Port: 3100</p>
                </div>
            </div>
            <p class="text-sm text-dynamic-variant leading-relaxed">
                Sends a mock message to the ContextBridge extension listening on `http://localhost:3100/notify`. A popup should appear inside VS Code.
            </p>
            <div class="mt-2 pt-4 border-t border-[var(--outline-var)] flex items-center justify-between">
                <span id="vscode-test-status" class="text-[11px] font-medium px-2 py-1 rounded-md bg-transparent text-dynamic-variant opacity-0 transition-opacity">Waiting...</span>
                <button id="test-vscode-btn" class="relative z-10 px-5 py-2.5 rounded-full bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all text-white text-sm font-semibold shadow-[0_0_15px_rgba(37,99,235,0.3)] flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">send</span> Ping Extension
                </button>
            </div>
        </div>
    </div>
</div>
