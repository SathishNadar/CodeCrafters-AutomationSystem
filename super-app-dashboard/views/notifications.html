<!-- NOTIFICATIONS SECTION -->
<div id="section-notifications" class="view-section relative h-full flex flex-col">
    <div class="flex justify-between items-center mb-6 shrink-0">
        <div>
            <h2 class="text-2xl font-bold text-dynamic tracking-tight">Activity Stream</h2>
            <p class="text-xs text-dynamic-variant mt-1.5 opacity-70 uppercase tracking-widest font-semibold">Live Email Task Intelligence</p>
        </div>
        <div class="flex gap-2">
            <button id="live-feed-btn" class="text-[11px] font-bold px-3 py-1.5 bg-primary-dynamic text-white rounded-lg shadow-lg flex items-center gap-1">
                <span class="material-symbols-outlined text-[14px]">sync</span>
                Live Feed
            </button>
            <button id="clear-notifications" class="text-[11px] font-bold px-3 py-1.5 bg-[var(--surface-high)] text-dynamic-variant rounded-lg border border-[var(--outline-var)] hover:bg-red-500/10 hover:text-red-500 transition-all">Clear All</button>
        </div>
    </div>
    
    <!-- Dynamic List Container -->
    <div id="email-notifications-list" class="space-y-4 overflow-y-auto flex-1 pb-4 pr-1">
        <!-- New notifications will be prepended here -->
        <div id="notifications-empty" class="glass-panel rounded-2xl p-12 flex flex-col items-center justify-center text-center opacity-60">
            <div class="w-16 h-16 rounded-full bg-[var(--surface-high)] flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-3xl text-dynamic-variant">mail_lock</span>
            </div>
            <h3 class="text-lg font-bold text-dynamic">No activity detected yet</h3>
            <p class="text-xs text-dynamic-variant mt-2 max-w-[240px]">The AI is monitor your inbox for tasks. New alerts will appear here in real-time.</p>
        </div>
    </div>

    <!-- Reply Modal Overlay (Hidden by default) -->
    <div id="reply-modal" class="absolute inset-0 z-50 bg-[var(--surface-low)]/80 backdrop-blur-md hidden flex items-center justify-center">
        <div class="bg-[var(--surface-high)] border border-[var(--outline-var)] rounded-2xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[90%] m-4">
            
            <!-- Modal Header -->
            <div class="flex justify-between items-center px-4 py-3 border-b border-[var(--outline-var)] shrink-0">
                <h3 class="font-bold text-dynamic text-sm flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">reply</span>
                    Compose Reply
                </h3>
                <button id="close-reply-modal" class="w-8 h-8 rounded-full hover:bg-[var(--surface-low)] flex items-center justify-center text-dynamic-variant transition-colors">
                    <span class="material-symbols-outlined text-sm">close</span>
                </button>
            </div>

            <!-- Modal Body (Scrollable) -->
            <div class="p-4 flex-1 overflow-y-auto flex flex-col gap-4">
                
                <!-- Metadata Info -->
                <div class="text-xs flex flex-col gap-1">
                    <div class="flex gap-2">
                        <span class="text-dynamic-variant font-medium w-12 shrink-0">To:</span>
                        <span id="reply-to-address" class="text-dynamic truncate font-mono">user@example.com</span>
                    </div>
                </div>

                <!-- Editable Subject -->
                <div>
                     <input type="text" id="reply-subject" class="w-full bg-[var(--surface-low)] border border-[var(--outline-var)] rounded-lg px-3 py-2 text-sm text-dynamic focus:outline-none focus:border-primary-dynamic transition-colors" placeholder="Subject">
                </div>

                <!-- Text Area for New Content -->
                <div class="flex flex-col flex-1">
                    <textarea id="reply-content" class="w-full flex-1 min-h-[150px] bg-[var(--surface-low)] border border-[var(--outline-var)] rounded-lg px-3 py-3 text-sm text-dynamic resize-none focus:outline-none focus:border-primary-dynamic transition-colors" placeholder="Write your reply here..."></textarea>
                </div>

                <!-- Original Email Content (Read Only) -->
                <div class="mt-2 text-xs">
                    <div class="font-medium text-dynamic-variant mb-2">Original Message:</div>
                    <div id="reply-original-body" class="p-3 bg-[var(--surface-low)] rounded-lg border border-[var(--outline-var)] text-dynamic opacity-70 max-h-[200px] overflow-y-auto whitespace-pre-wrap font-mono text-[10px]">
                        ...
                    </div>
                </div>

            </div>

            <!-- Modal Footer -->
            <div class="px-4 py-3 border-t border-[var(--outline-var)] flex justify-end gap-2 shrink-0 bg-[var(--surface-low)] rounded-b-2xl">
                <button id="cancel-reply-btn" class="px-4 py-1.5 rounded-lg text-xs font-bold text-dynamic-variant hover:text-dynamic transition-colors">Cancel</button>
                <button id="send-reply-btn" class="px-4 py-1.5 rounded-lg text-xs font-bold bg-primary-dynamic text-white shadow-lg hover:shadow-primary flex items-center gap-1 transition-all">
                    <span class="material-symbols-outlined text-[14px]">send</span>
                    Send Reference Task
                </button>
            </div>
            
        </div>
    </div>
</div>
