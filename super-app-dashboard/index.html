<!DOCTYPE html>
<html class="theme-nocturne" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Signal Forge | Focus Operations Center</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="styles.css" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "bg": "var(--bg-col)",
                        "surface": "var(--surface-col)",
                        "surface-low": "var(--surface-low)",
                        "surface-lowest": "var(--surface-lowest)",
                        "surface-high": "var(--surface-high)",
                        "on-surface": "var(--on-surface-col)",
                        "on-surface-variant": "var(--on-surface-variant)",
                        "primary": "var(--primary-col)",
                        "primary-container": "var(--primary-container)",
                        "secondary": "var(--secondary-col)",
                        "outline-variant": "var(--outline-var)"
                    }
                }
            }
        }
    </script>
</head>
<body class="app-shell antialiased">
    <div class="app-backdrop"></div>

    <div class="app-frame">
        <aside class="app-sidebar">
            <div class="brand-block">
                <div class="brand-mark">
                    <span class="material-symbols-outlined text-[20px]">timeline</span>
                </div>
                <div>
                    <p class="brand-kicker">Cognitive Ops</p>
                    <h1 class="brand-title text-dynamic">Signal Forge</h1>
                </div>
            </div>

            <nav class="flex-1 space-y-2">
                <button data-target="dashboard" class="nav-btn active w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all">
                    <span class="material-symbols-outlined">space_dashboard</span>
                    <span class="text-sm">Dashboard</span>
                </button>
                <button data-target="rules" data-protected="true" class="nav-btn text-dynamic-variant w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all">
                    <span class="material-symbols-outlined">rule_settings</span>
                    <span class="text-sm">Context Rules</span>
                </button>
                <button data-target="unified-inbox" data-protected="true" class="nav-btn text-dynamic-variant w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all">
                    <span class="material-symbols-outlined">inbox_customize</span>
                    <span class="text-sm">Unified Inbox</span>
                </button>
                <button data-target="vscode-context" data-protected="true" class="nav-btn text-dynamic-variant w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all">
                    <span class="material-symbols-outlined">code</span>
                    <span class="text-sm">VS Code Context</span>
                </button>
                <button data-target="browser-intelligence" data-protected="true" class="nav-btn text-dynamic-variant w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all">
                    <span class="material-symbols-outlined">travel_explore</span>
                    <span class="text-sm">Browser Intel</span>
                </button>
                <button data-target="settings" data-protected="true" class="nav-btn text-dynamic-variant w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all">
                    <span class="material-symbols-outlined">tune</span>
                    <span class="text-sm">Settings</span>
                </button>

                <button data-target="history" data-protected="true" class="nav-btn text-dynamic-variant w-full flex items-center gap-3 px-4 py-3 rounded-2xl transition-all">
                    <span class="material-symbols-outlined">stacked_line_chart</span>
                    <span class="text-sm">Session History</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="status-chip">
                    <span class="status-dot"></span>
                    <span class="text-xs font-semibold uppercase tracking-[0.24em] text-dynamic-variant">Live Monitoring</span>
                </div>

                <button id="theme-btn" class="theme-switcher">
                    <span>Theme: Nocturne</span>
                    <span class="material-symbols-outlined text-base">dark_mode</span>
                </button>
            </div>
        </aside>

        <main class="app-main">
            <header class="topbar">
                <div>
                    <p id="breadcrumb-parent" class="topbar-kicker">Ops View</p>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="material-symbols-outlined text-dynamic-variant text-sm">chevron_right</span>
                        <span id="breadcrumb-current" class="topbar-title">Dashboard</span>
                    </div>
                </div>

                <div class="topbar-actions">
                    <label class="search-shell hidden lg:flex">
                        <span class="material-symbols-outlined text-[18px] text-dynamic-variant">search</span>
                        <input placeholder="Search signals, tasks, history..." type="text"/>
                    </label>

                    <div id="topbar-profile-btn" class="operator-card cursor-pointer hover:bg-[var(--surface-high)] transition-all">
                        <div class="operator-copy">
                            <span class="text-[10px] uppercase tracking-[0.22em] text-dynamic-variant">Operator</span>
                            <span id="operator-name" class="text-sm font-semibold text-dynamic">Guest</span>
                            <span id="operator-status" class="text-[11px] text-dynamic-variant">Guest session</span>
                        </div>
                        <div class="operator-avatar" id="operator-avatar-container">
                            <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:16px; background-color: #64748b;">G</div>
                        </div>
                        <button id="topbar-login-btn" class="operator-login-btn">Login</button>
                    </div>
                </div>
            </header>

            <section id="view-container" class="view-host">
                <!-- Views will be injected here by renderer.js -->
            </section>
        </main>
    </div>

    <div id="auth-overlay" class="auth-overlay hidden">
        <div class="auth-panel">
            <div>
                <p class="panel-kicker">Welcome</p>
                <h2 id="auth-title" class="panel-title text-dynamic">Choose how to enter</h2>
                <p id="auth-subtitle" class="text-sm text-dynamic-variant mt-2 leading-relaxed">
                    Continue as a guest to explore the dashboard, or log in to unlock inbox, rules, history, and live services.
                </p>
            </div>

            <div id="auth-choice-actions" class="auth-choice-actions">
                <button id="guest-entry-btn" class="auth-ghost-btn">Continue as Guest</button>
                <button id="google-login-btn" class="auth-primary-btn">Continue with Google</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
